---
kind: PersistentVolume
apiVersion: v1
metadata:
  name: fdk-prod-static-rdf-server
spec:
  storageClassName: ""
  capacity:
    storage: 9G
  accessModes:
    - ReadWriteOnce
  nodeAffinity:
    required:
      nodeSelectorTerms:
        - matchExpressions:
            - key: topology.kubernetes.io/zone
              operator: In
              values:
                - europe-north1-a
  gcePersistentDisk:
    pdName: fdk-prod-static-rdf-server
    fsType: ext4
---
kind: PersistentVolumeClaim
apiVersion: v1
metadata:
  name: static-rdf-server-claim0
spec:
  storageClassName: ""
  volumeName: fdk-prod-static-rdf-server
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 9G
