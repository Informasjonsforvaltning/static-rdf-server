---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: static-rdf
  labels:
    fdk.service: static-rdf
spec:
  replicas: 1
  selector:
    matchLabels:
      fdk.service: static-rdf
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        fdk.service: static-rdf
    spec:
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: app
                    operator: In
                    values:
                      - static-rdf
      containers:
        - name: static-rdf-server
          image: static-rdf-server
          imagePullPolicy: Always
          env:
            - name: API_KEY
              valueFrom:
                secretKeyRef:
                  name: common
                  key: STATIC_RDF_SERVER_API_KEY
            - name: CORS_ORIGIN_PATTERNS
              value: ""
          ports:
            - containerPort: 5000
          resources:
            requests:
              memory: "200Mi"
              cpu: "10m"
            limits:
              memory: "200Mi"
          volumeMounts:
            - mountPath: /srv/www/static-rdf-server
              name: static-rdf-data
          livenessProbe:
            httpGet:
              path: /ping
              port: 5000
            initialDelaySeconds: 60
            periodSeconds: 90
            successThreshold: 1
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /ready
              port: 5000
            initialDelaySeconds: 120
            periodSeconds: 90
            successThreshold: 1
            failureThreshold: 5
        - name: static-rdf-nginx
          image: static-rdf-nginx
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          resources:
            requests:
              memory: "100Mi"
              cpu: "1m"
            limits:
              memory: "100Mi"
          volumeMounts:
            - mountPath: /srv/www/static-rdf-server
              name: static-rdf-data
              readOnly: true
          livenessProbe:
            httpGet:
              path: /ping
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 30
            successThreshold: 1
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /ready
              port: 8080
            initialDelaySeconds: 20
            periodSeconds: 30
            successThreshold: 1
            failureThreshold: 5
      volumes:
        - name: static-rdf-data
          persistentVolumeClaim:
            claimName: static-rdf-server-claim0
      restartPolicy: Always
